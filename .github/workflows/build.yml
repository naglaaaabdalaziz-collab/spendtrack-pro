name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npm run build
      - run: |
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          npx cap add android || true
          npx cap copy android
          npx cap sync android
      - name: Fix minSdk
        run: |
          sed -i 's/minSdkVersion = 22/minSdkVersion = 24/' android/variables.gradle || true
          sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/' android/variables.gradle || true
          sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/' android/variables.gradle || true
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: SpendTrack-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
